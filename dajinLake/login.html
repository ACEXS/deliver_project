<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 大金湖文创特产商城</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <header>
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="images/大金湖全景.jpeg" alt="大金湖文创特产商城" style="width: 40px; height: 40px; object-fit: cover;">
          大金湖文创特产商城
        </a>
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="products.html">商品列表</a></li>
          <li><a href="about.html">关于我们</a></li>
          <li><a href="contact.html">联系我们</a></li>
          <li>
            <a href="cart.html" class="cart-icon">
              <i class="fas fa-shopping-cart"></i>
              <span class="cart-count">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- 登录页面 -->
  <section class="section">
    <div class="container">
      <div class="section-title">
        <h2>用户登录</h2>
        <p>请登录您的账号</p>
      </div>
      
      <div style="max-width: 500px; margin: 0 auto; background-color: white; padding: 2rem; border-radius: 8px; box-shadow: var(--shadow);">
        <form id="login-form">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required>
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
              <input type="checkbox" id="remember" name="remember">
              <label for="remember">记住我</label>
            </div>
            <a href="#" style="color: var(--primary-color); text-decoration: none;">忘记密码？</a>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
          <div style="text-align: center; margin-top: 1rem;">
            <p>还没有账号？ <a href="register.html" style="color: var(--primary-color); text-decoration: none;">立即注册</a></p>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="images/大金湖全景.jpeg" alt="大金湖文创特产商城" style="width: 40px; height: 40px; object-fit: cover;">
          大金湖文创特产商城
        </div>
        <div class="footer-links">
          <h4>快速链接</h4>
          <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="products.html">商品列表</a></li>
            <li><a href="about.html">关于我们</a></li>
            <li><a href="contact.html">联系我们</a></li>
          </ul>
        </div>
        <div class="footer-links">
          <h4>商品分类</h4>
          <ul>
            <li><a href="products.html?category=文创产品">文创产品</a></li>
            <li><a href="products.html?category=特产">特产</a></li>
          </ul>
        </div>
        <div class="footer-contact">
          <h4>联系我们</h4>
          <p><i class="fas fa-map-marker-alt"></i> 福建省三明市泰宁县大金湖旅游经济开发区</p>
          <p><i class="fas fa-phone"></i> 0598-1234567</p>
          <p><i class="fas fa-envelope"></i> info@dajinlake.com</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 大金湖文创特产商城. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script>
    // 登录表单提交
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // 模拟登录
      if (username && password) {
        // 设置登录状态，1小时过期
        const expiresAt = new Date().getTime() + 60 * 60 * 1000;
        localStorage.setItem('user', JSON.stringify({
          username: username,
          expiresAt: expiresAt
        }));
        
        alert('登录成功！');
        // 实际项目中这里会发送登录请求
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
