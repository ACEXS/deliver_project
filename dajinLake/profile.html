<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 大金湖文创特产商城</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <header>
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="images/大金湖全景.jpeg" alt="大金湖文创特产商城" style="width: 40px; height: 40px; object-fit: cover;">
          大金湖文创特产商城
        </a>
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="products.html">商品列表</a></li>
          <li><a href="about.html">关于我们</a></li>
          <li><a href="contact.html">联系我们</a></li>
          <li>
            <a href="cart.html" class="cart-icon">
              <i class="fas fa-shopping-cart"></i>
              <span class="cart-count">0</span>
            </a>
          </li>
          <li>
            <a href="profile.html" style="color: var(--primary-color);">
              <i class="fas fa-user"></i> 个人中心
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- 个人中心 -->
  <section class="section">
    <div class="container">
      <div class="section-title">
        <h2>个人中心</h2>
        <p>管理您的账号信息和地址</p>
      </div>
      
      <div style="display: grid; grid-template-columns: 200px 1fr; gap: 2rem;">
        <!-- 侧边栏 -->
        <div style="background-color: white; padding: 1.5rem; border-radius: 8px; box-shadow: var(--shadow);">
          <h3 style="margin-bottom: 1.5rem; color: var(--dark-color);">个人中心</h3>
          <ul style="list-style: none; padding: 0;">
            <li style="margin-bottom: 1rem;">
              <a href="profile.html" style="color: var(--primary-color); text-decoration: none; display: flex; align-items: center;">
                <i class="fas fa-user-circle" style="margin-right: 10px;"></i> 个人信息
              </a>
            </li>
            <li style="margin-bottom: 1rem;">
              <a href="address.html" style="color: var(--text-color); text-decoration: none; display: flex; align-items: center;">
                <i class="fas fa-map-marker-alt" style="margin-right: 10px;"></i> 地址管理
              </a>
            </li>
            <li style="margin-bottom: 1rem;">
              <a href="orders.html" style="color: var(--text-color); text-decoration: none; display: flex; align-items: center;">
                <i class="fas fa-box" style="margin-right: 10px;"></i> 我的订单
              </a>
            </li>
            <li style="margin-bottom: 1rem;">
              <a href="login.html" style="color: var(--text-color); text-decoration: none; display: flex; align-items: center;">
                <i class="fas fa-sign-out-alt" style="margin-right: 10px;"></i> 退出登录
              </a>
            </li>
          </ul>
        </div>
        
        <!-- 主内容 -->
        <div style="background-color: white; padding: 2rem; border-radius: 8px; box-shadow: var(--shadow);">
          <h3 style="margin-bottom: 2rem; color: var(--dark-color);">个人信息</h3>
          <form id="profile-form">
            <div class="form-group">
              <label for="name">姓名</label>
              <input type="text" id="name" name="name" value="测试用户" required>
            </div>
            <div class="form-group">
              <label for="email">邮箱</label>
              <input type="email" id="email" name="email" value="test@example.com" required>
            </div>
            <div class="form-group">
              <label for="phone">手机号</label>
              <input type="tel" id="phone" name="phone" value="13800138000" required>
            </div>
            <button type="submit" class="btn btn-primary">保存修改</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="images/大金湖全景.jpeg" alt="大金湖文创特产商城" style="width: 40px; height: 40px; object-fit: cover;">
          大金湖文创特产商城
        </div>
        <div class="footer-links">
          <h4>快速链接</h4>
          <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="products.html">商品列表</a></li>
            <li><a href="about.html">关于我们</a></li>
            <li><a href="contact.html">联系我们</a></li>
          </ul>
        </div>
        <div class="footer-links">
          <h4>商品分类</h4>
          <ul>
            <li><a href="products.html?category=文创产品">文创产品</a></li>
            <li><a href="products.html?category=特产">特产</a></li>
          </ul>
        </div>
        <div class="footer-contact">
          <h4>联系我们</h4>
          <p><i class="fas fa-map-marker-alt"></i> 福建省三明市泰宁县大金湖旅游经济开发区</p>
          <p><i class="fas fa-phone"></i> 0598-1234567</p>
          <p><i class="fas fa-envelope"></i> info@dajinlake.com</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 大金湖文创特产商城. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script>
    // 个人信息表单提交
    document.getElementById('profile-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('信息保存成功！');
      // 实际项目中这里会发送更新请求
    });
  </script>
</body>
</html>
